user_description: Haoyang Huang is currently the Director of the Image and Multimodal Lab at JD.com's Exploration Research Institute, leading a team in research on unified multimodal generation foundational models. He holds a PhD candidate at Peking University and has won numerous awards in top global data mining competitions, including a Kaggle Master title. At Microsoft Research Asia, he focused on research into multimodal and multilingual foundational models, pioneering the design of multilingual foundational models and launching the Unicoder multilingual model covering 100 languages. He applied these technologies to Microsoft Bing Search and Microsoft Machine Translation, significantly improving the understanding of less commonly spoken languages, and won first place globally in the WMT21 machine translation competition. Furthermore, he led the development of M3P, the world's first multilingual multimodal pre-trained model. He has published dozens of papers at top conferences such as CVPR, NeurIPS, ACL, EMNLP, and AAAI, with over 3,000 citations on Google Scholar. In 2024, he joined StepFun, leading and open-sourcing the 30B StepVideo model series (Step-Video-T2V and Step-Video-TI2V). Recently, JoyAI-Image-Edit, an integrated image spatial editing model, and JoyAI-Echo, an ultra-long audio and video generation model, were open-sourced.
user_description2: 黄浩洋现任京东探索研究院图像与多模态实验室主任，带领团队开展统一多模态生成基础模型研究。北京大学前沿博士在读，多次获得全球顶级数据挖掘比赛奖项，并获得 Kaggle Master 称号。在微软亚洲研究院，他专注于多模态与多语言基础模型的研究，最早开展多语言基础模型的设计，推出了覆盖 100 种语言的多语言模型 Unicoder，并将相关技术应用于微软必应搜索团队和微软机器翻译，显著提升了对小语种的理解能力，且参与 WMT21 机器翻译比赛获得全球第一名。此外，他还主导了全球首个多语言多模态预训练模型 M3P 的研发。他在 CVPR、NeurIPS、ACL、EMNLP、AAAI 等顶级会议发表了数十篇论文，谷歌学术引用量 3,000 次。2024 年，他加入 StepFun，主导并开源了 30B StepVideo 模型系列（Step-Video-T2V、Step-Video-TI2V）。近期开源JoyAI-Image-Edit一体化图像空间编辑模型以及JoyAI-Echo超长音视频生成模型。

